[project]
name = "fastup"
version = "0.1.0"
description = "a fastapi starter kit with best practices, and a clean project structure."
readme = "README.md"
requires-python = ">=3.13"

dependencies = [
    "fastapi>=0.115.14",
    "uvicorn>=0.35.0",
]

[dependency-groups]
dev = [
    "httpx>=0.28.1",
    "pytest>=8.4.1",
    "ruff>=0.12.2",
]

[tool.uv]
default-groups = ["dev"]

[tool.pyright]
pythonVersion = "3.13"
venvPath = "."
venv = ".venv"
reportMissingTypeStubs = false
exclude = [
  "**/__pycache__",
  ".cache/",
  ".venv/",
]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
cache_dir = ".cache/pytest"

[tool.ruff]
cache-dir = ".cache/ruff"
