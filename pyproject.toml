[project]
name = "fastup"
version = "0.1.0"
description = "fastapi starter kit for clean and scalable api development"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "fastapi>=0.120.0",
    "uvicorn>=0.38.0",
]

[dependency-groups]
dev = [
    "pyright>=1.1.407",
    "pytest>=8.4.2",
    "pytest-cov>=7.0.0",
    "ruff>=0.14.2",
]

[tool.uv]
default-groups = ["dev"]

[tool.pyright]
pythonVersion = "3.13"
typeCheckingMode = "standard"
venvPath = "."
venv = ".venv"
exclude = [".cache", ".venv"]

[tool.ruff]
target-version = "py313"
line-length = 88
cache-dir = ".cache/ruff"
exclude = [".cache", ".venv"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = [ "-x", "-q" ]
cache_dir = ".cache/pytest"
log_cli = false
log_cli_level = "INFO"

[tool.coverage.run]
data_file = ".cache/coverage/.coverage"
branch = true

[tool.coverage.report]
omit = [ "settings.py", "main.py" ]
exclude_also = [ ".*import.*", ".*logging.*" ]
skip_empty = true

[tool.coverage.html]
directory = ".cache/coverage/html"
