[project]
name = "fastup"
version = "0.1.0"
description = "fastapi starter kit for clean and scalable api development"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "aiosqlite>=0.21.0",
    "alembic>=1.17.0",
    "fastapi>=0.120.0",
    "pwdlib[argon2]>=0.3.0",
    "sqlalchemy>=2.0.44",
    "uvicorn>=0.38.0",
]

[dependency-groups]
dev = [
    "httpx>=0.28.1",
    "pyright>=1.1.407",
    "pytest>=8.4.2",
    "pytest-asyncio>=1.2.0",
    "pytest-cov>=7.0.0",
    "ruff>=0.14.2",
]

[tool.uv]
default-groups = ["dev"]

[tool.pyright]
pythonVersion = "3.13"
typeCheckingMode = "standard"
venvPath = "."
venv = ".venv"
exclude = [".cache", ".venv", "alembic"]

[tool.ruff]
target-version = "py313"
line-length = 88
cache-dir = ".cache/ruff"
exclude = [".cache", ".venv"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = [ "-x", "-q" ]
cache_dir = ".cache/pytest"
log_cli = false
log_cli_level = "INFO"
asyncio_mode = "auto"

[tool.coverage.run]
data_file = ".cache/coverage/.coverage"
branch = true

[tool.coverage.report]
omit = [ "settings.py", "main.py", "mappings.py"]
exclude_also = [ ".*import.*", ".*logging.*" ]
skip_empty = true

[tool.coverage.html]
directory = ".cache/coverage/html"

[tool.alembic]
script_location = "%(here)s/alembic"
prepend_sys_path = [
    "."
]
