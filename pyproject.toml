[project]
name = "fastup"
version = "0.1.0"
description = "fastapi starter kit for clean, scalable api development."
readme = "README.md"
requires-python = ">=3.13"
dependencies = []

[dependency-groups]
dev = [
    "pre-commit>=4.3.0",
    "pyright>=1.1.406",
    "pytest>=8.4.2",
    "pytest-cov>=7.0.0",
    "ruff>=0.13.3",
]

[tool.uv]
default-groups = ["dev"]

[tool.pyright]
pythonVersion = "3.13"
typeCheckingMode = "standard"
venvPath = "."
venv = ".venv"
reportAny = false
reportExplicitAny = false

[tool.ruff]
line-length = 88
cache-dir = ".cache/ruff"

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = [ "-x", "-q" ]
cache_dir = ".cache/pytest"

[tool.coverage.run]
data_file = ".cache/coverage/.coverage"
branch = true

[tool.coverage.report]
omit = [ "settings.py", "main.py" ]
exclude_also = [ ".*import.*", ".*logging.*" ]
skip_empty = true
skip_covered = false

[tool.coverage.html]
directory = ".cache/coverage/html"
