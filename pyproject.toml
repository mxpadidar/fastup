[project]
name = "fastup"
version = "0.1.0"
description = "fastapi starter kit for clean, scalable api development."
readme = "README.md"
requires-python = ">=3.13"

dependencies = [
    "fastapi>=0.115.14",
    "uvicorn>=0.35.0",
]

[dependency-groups]
dev = [
    "httpx>=0.28.1",
    "pyright>=1.1.402",
    "pytest>=8.4.1",
    "pytest-cov>=6.2.1",
    "ruff>=0.12.3",
]

[tool.uv]
default-groups = ["dev"]

[tool.pyright]
pythonVersion = "3.13"
venvPath = "."
venv = ".venv"

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = "--maxfail=1 --cov-report=term --cov-report=html"
cache_dir = ".cache/pytest"

[tool.coverage.run]
data_file = ".cache/coverage/.coverage"
branch = true

[tool.coverage.html]
directory = ".cache/coverage/html"

[tool.coverage.xml]
output = ".cache/coverage/coverage.xml"

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "pass",
    "...",
]

[tool.ruff]
line-length = 79
cache-dir = ".cache/ruff"

