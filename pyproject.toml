[project]
name = "fastup"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
  "fastapi>=0.115.12",
  "psycopg>=3.2.9",
  "python-dotenv>=1.1.0",
  "sqlalchemy>=2.0.41",
  "uvicorn>=0.34.2",
]

[dependency-groups]
dev = [
  "httpx>=0.28.1",
  "pyright>=1.1.402",
  "pytest>=8.3.5",
  "ruff>=0.11.13",
]

[tool.pyright]
pythonVersion = "3.13"
venvPath = "."
venv = ".venv"
reportMissingImports = "error"
reportMissingTypeStubs = false
exclude = [
  "**/__pycache__",
  ".cache/",
  ".venv/",
]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
cache_dir = ".cache/pytest"

[tool.ruff]
cache-dir = ".cache/ruff"

